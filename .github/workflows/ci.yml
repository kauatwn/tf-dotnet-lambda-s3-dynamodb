name: Continuous Integration

on:
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Code Validation & Docker Check
    runs-on: ubuntu-24.04
    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore ImageProcessor.slnx

      - name: Build Solution
        run: dotnet build ImageProcessor.slnx --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test tests/ImageProcessor.UnitTests/ImageProcessor.UnitTests.csproj --no-build --configuration Release

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          # Allows Docker Buildx to access the localhost network (LocalStack)
          driver-opts: network=host

      - name: Docker Build Check (Dry Run)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: src/ImageProcessor.Lambda.UploadImage/Dockerfile
          push: false
          tags: image-processor-lambda:${{ env.IMAGE_TAG }}
          platforms: linux/amd64
          # Defines a shared scope so the CD workflow can find this cache
          cache-from: type=gha,scope=lambda-aot-build
          cache-to: type=gha,mode=max,scope=lambda-aot-build
