name: Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Code Validation & Docker Check
    runs-on: ubuntu-24.04
    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore ImageProcessor.slnx

      - name: Build Solution
        run: dotnet build ImageProcessor.slnx --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test tests/ImageProcessor.UnitTests/ImageProcessor.UnitTests.csproj --no-build --configuration Release

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Build Check (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/ImageProcessor.Lambda.UploadImage/Dockerfile
          push: false
          tags: image-processor-lambda:${{ env.IMAGE_TAG }}
          platforms: linux/amd64
          cache-to: type=gha,mode=max
