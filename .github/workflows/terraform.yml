name: Serverless CI - LocalStack Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      LOCALSTACK_ENDPOINT: "http://127.0.0.1:4566"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Start LocalStack
        uses: LocalStack/setup-localstack@7c8a0cb3405bc58be4c8f763f812aa000bc46303 # v0.3.2
        with:
          image-tag: "latest"
          install-awslocal: "true"
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

      - name: Setup .NET and Lambda Tools
        run: |
          dotnet tool install -g Amazon.Lambda.Tools

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Terraform Init
        run: terraform init -upgrade
        working-directory: infra/environments/dev

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="localstack_endpoint=${{ env.LOCALSTACK_ENDPOINT }}" \
            -var="lambda_architecture=x86_64"
        working-directory: infra/environments/dev

      - name: Run E2E Integration Test
        run: |
          AWS_API_URL=$(terraform output -raw api_url)
          echo "Terraform Output (AWS Format): $AWS_API_URL"

          # Extract the API ID generated by LocalStack (e.g., f59wrz6dpl)
          API_ID=$(echo "$AWS_API_URL" | cut -d'/' -f3 | cut -d'.' -f1)

          # Construct the internal URL format recognized by LocalStack
          # Format: http://127.0.0.1:4566/restapis/<api_id>/<stage>/_user_request_/<path>
          LOCALSTACK_URL="$LOCALSTACK_ENDPOINT/restapis/$API_ID/local/_user_request_/images"
          echo "LocalStack URL: $LOCALSTACK_URL"

          # Trigger the request
          RESPONSE=$(curl -s -X POST "$LOCALSTACK_URL" \
            -H "Content-Type: application/json" \
            -d '{"FileName": "github_action.png", "ContentType": "image/png", "Base64Image": "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII="}')

          echo "API Response: $RESPONSE"

          if [[ "$RESPONSE" == *"ImageId"* ]]; then
            echo "SUCCESS: Lambda processed the image and saved metadata."
            exit 0
          else
            echo "FAILURE: API did not return the expected result."
            exit 1
          fi
        working-directory: infra/environments/dev

      - name: Show LocalStack logs
        if: always()
        run: localstack logs | tail -50
