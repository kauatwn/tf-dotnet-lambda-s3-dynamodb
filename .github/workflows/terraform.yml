name: Serverless CI - LocalStack Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    env:
      LOCALSTACK_ENDPOINT: "http://127.0.0.1:4566"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Start LocalStack
        uses: LocalStack/setup-localstack@7c8a0cb3405bc58be4c8f763f812aa000bc46303 # v0.3.2
        with:
          image-tag: "2026.06.0"
          install-awslocal: "true"
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Terraform Init
        run: terraform init -upgrade
        working-directory: infra/environments/dev

      - name: Terraform Apply
        run: |
          terraform apply \
            -target="module.compute.aws_ecr_repository.lambda_repo" \
            -var="localstack_endpoint=${{ env.LOCALSTACK_ENDPOINT }}" \
            -var="lambda_architecture=x86_64" \
            -auto-approve
        working-directory: infra/environments/dev

      - name: Docker Build & Push to LocalStack ECR
        run: |
          IMAGE_URI="000000000000.dkr.ecr.us-east-1.localhost.localstack.cloud:4566/image-processor-lambda:latest"
          docker build --platform linux/amd64 -t $IMAGE_URI -f src/ImageProcessor.Lambda.UploadImage/Dockerfile .
          docker push $IMAGE_URI

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="localstack_endpoint=${{ env.LOCALSTACK_ENDPOINT }}" \
            -var="lambda_architecture=x86_64" \
            -out=tfplan
        working-directory: infra/environments/dev

      - name: Terraform Apply (Full Infrastructure)
        run: terraform apply -auto-approve tfplan
        working-directory: infra/environments/dev

      - name: Run E2E Integration Test
        run: |
          API_ID=$(terraform output -raw api_id)
          echo "Using API ID: $API_ID"
          LOCALSTACK_URL="$LOCALSTACK_ENDPOINT/_aws/execute-api/$API_ID/local/images"
          echo "LocalStack URL: $LOCALSTACK_URL"

          # Trigger the request
          RESPONSE=$(curl -s -X POST "$LOCALSTACK_URL" \
            -H "Content-Type: application/json" \
            -d '{"FileName": "github_action.png", "ContentType": "image/png", "Base64Image": "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII="}')

          echo "API Response: $RESPONSE"

          if [[ "$RESPONSE" == *"ImageId"* ]]; then
            echo "SUCCESS: Lambda processed the image and saved metadata."
            exit 0
          else
            echo "FAILURE: API did not return the expected result."
            exit 1
          fi
        working-directory: infra/environments/dev

      - name: Show LocalStack logs
        if: always()
        run: localstack logs | tail -50
